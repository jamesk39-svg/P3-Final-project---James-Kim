<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NutriTrack Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        nav { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        nav a { margin-right: 15px; text-decoration: none; color: #007BFF; font-weight: bold; }
        h1, h2 { color: #2C3E50; }
        form { background: #f8f9fa; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #28a745; color: white; border: none; font-size: 16px; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #E9ECEF; }
        .alert { padding: 15px; background-color: #f8d7da; color: #721c24; border-radius: 4px; }
        .success-box { background: #e2f0d9; padding: 15px; border-left: 5px solid #385723; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/">📋 Meal Dashboard</a>
            <a href="/find-alternative">💡 Swap Food Alternatives</a>
        </nav>
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
